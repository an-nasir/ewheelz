name: Daily PakWheels EV Scraper

on:
  schedule:
    # 7pm UTC = midnight Pakistan (UTC+5)
    - cron: "0 19 * * *"
  # Also allows manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      pages:
        description: "Pages per model"
        default: "3"
      dry_run:
        description: "Dry run (yes/no)"
        default: "no"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run scraper
        env:
          EWHEELZ_API: ${{ secrets.EWHEELZ_API }}
          SCRAPER_KEY: ${{ secrets.SCRAPER_KEY }}
        run: |
          PAGES="${{ github.event.inputs.pages || '2' }}"
          DRY="${{ github.event.inputs.dry_run || 'no' }}"
          if [ "$DRY" = "yes" ]; then
            python scripts/scrape_pakwheels.py --pages "$PAGES" --dry-run
          else
            python scripts/scrape_pakwheels.py --pages "$PAGES"
          fi
